<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>สุ่มเลขหวย 🎰</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      font-family: 'Segoe UI', 'Noto Sans Thai', sans-serif;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px 48px;
    }

    h1 {
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: 2px;
      margin-bottom: 6px;
      background: linear-gradient(90deg, #f9c74f, #f8961e, #f3722c);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      font-size: 0.85rem;
      color: #a0aec0;
      margin-bottom: 32px;
      letter-spacing: 1px;
    }

    /* ── Tabs ── */
    .tabs {
      display: flex;
      gap: 8px;
      background: rgba(255,255,255,0.06);
      border-radius: 16px;
      padding: 6px;
      margin-bottom: 28px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .tab {
      padding: 8px 20px;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 600;
      transition: all 0.25s;
      background: transparent;
      color: #a0aec0;
    }

    .tab.active {
      background: linear-gradient(135deg, #f9c74f, #f8961e);
      color: #1a1a2e;
    }

    .tab:hover:not(.active) { color: #fff; background: rgba(255,255,255,0.1); }

    /* ── Card ── */
    .card {
      background: rgba(255,255,255,0.07);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 24px;
      padding: 32px 28px;
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
    }

    /* ── Options row ── */
    .options {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .opt-btn {
      padding: 7px 18px;
      border-radius: 50px;
      border: 1.5px solid rgba(255,255,255,0.2);
      background: transparent;
      color: #cbd5e0;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.2s;
      font-weight: 600;
    }

    .opt-btn.active {
      border-color: #f9c74f;
      background: rgba(249,199,79,0.15);
      color: #f9c74f;
    }

    .opt-btn:hover:not(.active) { border-color: #fff; color: #fff; }

    /* ── Display ── */
    .display-area {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      width: 100%;
    }

    .result-label {
      font-size: 0.78rem;
      color: #90a4ae;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .digits-wrap {
      display: flex;
      gap: 12px;
      align-items: center;
      justify-content: center;
    }

    .digit-box {
      width: 72px;
      height: 90px;
      border-radius: 16px;
      background: linear-gradient(160deg, rgba(255,255,255,0.12), rgba(255,255,255,0.04));
      border: 1.5px solid rgba(255,255,255,0.18);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      font-weight: 900;
      color: #f9c74f;
      text-shadow: 0 0 20px rgba(249,199,79,0.5);
      transition: transform 0.1s;
      user-select: none;
    }

    .digit-box.spin {
      animation: spin 0.4s ease-out;
    }

    @keyframes spin {
      0%   { transform: rotateX(0deg);   opacity: 1; }
      40%  { transform: rotateX(90deg);  opacity: 0.3; }
      70%  { transform: rotateX(-20deg); opacity: 0.8; }
      100% { transform: rotateX(0deg);   opacity: 1; }
    }

    .dot-sep { font-size: 2rem; color: rgba(255,255,255,0.3); margin-bottom: 4px; }

    /* ── กลับ badge ── */
    .reverse-row {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .arrow-icon { font-size: 1.2rem; color: #a0aec0; }

    .reverse-digits {
      display: flex;
      gap: 8px;
    }

    .rev-box {
      width: 52px;
      height: 66px;
      border-radius: 12px;
      background: rgba(100,200,255,0.08);
      border: 1.5px dashed rgba(100,200,255,0.35);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      font-weight: 800;
      color: #90cdf4;
    }

    /* ── Buttons ── */
    .btn-spin {
      width: 100%;
      padding: 16px;
      border-radius: 16px;
      border: none;
      background: linear-gradient(135deg, #f9c74f, #f8961e);
      color: #1a1a2e;
      font-size: 1.1rem;
      font-weight: 800;
      cursor: pointer;
      letter-spacing: 1px;
      transition: transform 0.15s, box-shadow 0.15s;
      box-shadow: 0 6px 24px rgba(249,199,79,0.35);
    }

    .btn-spin:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(249,199,79,0.45); }
    .btn-spin:active { transform: translateY(0); }

    .btn-spin:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    /* ── History ── */
    .history-section {
      width: 100%;
      max-width: 480px;
      margin-top: 24px;
    }

    .history-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .history-title {
      font-size: 0.85rem;
      color: #a0aec0;
      letter-spacing: 1px;
    }

    .btn-clear {
      background: transparent;
      border: 1px solid rgba(255,255,255,0.15);
      color: #a0aec0;
      padding: 4px 12px;
      border-radius: 8px;
      font-size: 0.78rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-clear:hover { border-color: #f3722c; color: #f3722c; }

    .history-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      max-height: 280px;
      overflow-y: auto;
      padding-right: 4px;
    }

    .history-list::-webkit-scrollbar { width: 4px; }
    .history-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 4px; }

    .history-item {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      padding: 10px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: translateY(0); } }

    .h-num { font-size: 1.4rem; font-weight: 800; color: #f9c74f; letter-spacing: 4px; }
    .h-rev { font-size: 1rem; color: #90cdf4; letter-spacing: 3px; }
    .h-tag {
      font-size: 0.72rem;
      padding: 3px 10px;
      border-radius: 50px;
      background: rgba(249,199,79,0.15);
      color: #f9c74f;
      font-weight: 600;
    }
    .h-tag.t2 { background: rgba(144,205,244,0.15); color: #90cdf4; }

    .empty-msg { text-align: center; color: #4a5568; font-size: 0.85rem; padding: 20px; }

    /* ── Count selector ── */
    .count-row {
      display: flex;
      align-items: center;
      gap: 12px;
      width: 100%;
    }

    .count-label { font-size: 0.82rem; color: #a0aec0; white-space: nowrap; }

    .count-row input[type=range] {
      flex: 1;
      accent-color: #f9c74f;
    }

    .count-val {
      font-size: 0.9rem;
      font-weight: 700;
      color: #f9c74f;
      min-width: 28px;
      text-align: center;
    }

    /* responsive */
    @media (max-width: 360px) {
      .digit-box { width: 60px; height: 76px; font-size: 2.4rem; }
      .rev-box   { width: 44px; height: 56px; font-size: 1.6rem; }
    }
  </style>
</head>
<body>

  <h1>🎰 สุ่มเลขหวย</h1>
  <p class="subtitle">LUCKY NUMBER GENERATOR</p>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab active" onclick="setMode('3')">3 ตัว</button>
    <button class="tab" onclick="setMode('2')">2 ตัว</button>
  </div>

  <!-- Card -->
  <div class="card">

    <!-- บน/ล่าง options -->
    <div class="options" id="posOptions">
      <button class="opt-btn active" onclick="setPos('บน')">บน</button>
      <button class="opt-btn" onclick="setPos('ล่าง')">ล่าง</button>
      <button class="opt-btn" onclick="setPos('บน+ล่าง')">บน + ล่าง</button>
    </div>

    <!-- จำนวนที่สุ่ม -->
    <div class="count-row">
      <span class="count-label">จำนวนที่สุ่ม</span>
      <input type="range" id="countRange" min="1" max="5" value="1" oninput="updateCount(this.value)" />
      <span class="count-val" id="countVal">1</span>
    </div>

    <!-- Display -->
    <div class="display-area" id="displayArea">
      <!-- filled by JS -->
    </div>

    <!-- Spin button -->
    <button class="btn-spin" id="spinBtn" onclick="spin()">🎲 สุ่มเลข!</button>

  </div>

  <!-- History -->
  <div class="history-section">
    <div class="history-header">
      <span class="history-title">📋 ประวัติการสุ่ม</span>
      <button class="btn-clear" onclick="clearHistory()">ล้างประวัติ</button>
    </div>
    <div class="history-list" id="historyList">
      <p class="empty-msg">ยังไม่มีการสุ่ม กดปุ่มด้านบนเลย!</p>
    </div>
  </div>

<script>
  let mode = '3';       // '2' | '3'
  let pos  = 'บน';
  let count = 1;
  let history = JSON.parse(localStorage.getItem('lotto_history') || '[]');
  let spinning = false;

  function setMode(m) {
    mode = m;
    document.querySelectorAll('.tab').forEach((t, i) => {
      t.classList.toggle('active', (i === 0 && m === '3') || (i === 1 && m === '2'));
    });
    resetDisplay();
  }

  function setPos(p) {
    pos = p;
    document.querySelectorAll('.opt-btn').forEach(b => {
      b.classList.toggle('active', b.textContent === p);
    });
  }

  function updateCount(v) {
    count = parseInt(v);
    document.getElementById('countVal').textContent = v;
  }

  function rand(digits) {
    const max = Math.pow(10, digits);
    return Math.floor(Math.random() * max).toString().padStart(digits, '0');
  }

  function reverse(str) { return str.split('').reverse().join(''); }

  function resetDisplay() {
    const area = document.getElementById('displayArea');
    const digits = mode === '3' ? 3 : 2;
    const placeholder = '?'.repeat(digits);
    area.innerHTML = buildDisplayHTML(placeholder.split(''), placeholder, false);
  }

  function buildDisplayHTML(digitArr, num, showReverse) {
    const boxes = digitArr.map(d => `<div class="digit-box">${d}</div>`).join('');
    const rev = reverse(num);
    const revBoxes = rev.split('').map(d => `<div class="rev-box">${d}</div>`).join('');
    const revSection = showReverse && rev !== num ? `
      <div class="reverse-row">
        <span class="arrow-icon">🔄</span>
        <div class="reverse-digits">${revBoxes}</div>
        <span style="font-size:0.75rem;color:#90cdf4;">กลับ</span>
      </div>` : '';
    return `
      <span class="result-label">${mode === '3' ? 'เลขท้าย 3 ตัว' : 'เลขท้าย 2 ตัว'} — ${pos}</span>
      <div class="digits-wrap">${boxes}</div>
      ${revSection}
    `;
  }

  function animateDigits(finalNums) {
    const area = document.getElementById('displayArea');
    const digits = mode === '3' ? 3 : 2;

    // For multiple, just do first one animated then show all
    const first = finalNums[0];
    area.innerHTML = buildDisplayHTML(first.split(''), first, false);
    const boxes = area.querySelectorAll('.digit-box');
    boxes.forEach(b => b.classList.add('spin'));

    let frame = 0;
    const total = 18;
    const iv = setInterval(() => {
      frame++;
      const tempArr = Array.from({length: digits}, () => Math.floor(Math.random()*10).toString());
      boxes.forEach((b, i) => {
        if (frame >= total - digits + i) {
          b.textContent = first[i];
        } else {
          b.textContent = tempArr[i];
        }
      });
      if (frame >= total) {
        clearInterval(iv);
        boxes.forEach(b => b.classList.remove('spin'));
        showAll(finalNums);
        spinning = false;
        document.getElementById('spinBtn').disabled = false;
      }
    }, 55);
  }

  function showAll(nums) {
    const area = document.getElementById('displayArea');
    const digits = mode === '3' ? 3 : 2;
    let html = `<span class="result-label">${mode === '3' ? 'เลขท้าย 3 ตัว' : 'เลขท้าย 2 ตัว'} — ${pos}</span>`;

    nums.forEach((num, idx) => {
      const rev = reverse(num);
      const boxes = num.split('').map(d => `<div class="digit-box">${d}</div>`).join('');
      html += `<div class="digits-wrap">${boxes}</div>`;
      if (rev !== num) {
        const revBoxes = rev.split('').map(d => `<div class="rev-box">${d}</div>`).join('');
        html += `<div class="reverse-row">
          <span class="arrow-icon">🔄</span>
          <div class="reverse-digits">${revBoxes}</div>
          <span style="font-size:0.75rem;color:#90cdf4;">กลับ</span>
        </div>`;
      }
      if (idx < nums.length - 1) html += `<div style="width:100%;height:1px;background:rgba(255,255,255,0.08);margin:4px 0;"></div>`;
    });

    area.innerHTML = html;
  }

  function spin() {
    if (spinning) return;
    spinning = true;
    document.getElementById('spinBtn').disabled = true;

    const digits = mode === '3' ? 3 : 2;
    const positions = pos === 'บน+ล่าง' ? ['บน', 'ล่าง'] : [pos];
    const results = [];

    for (let i = 0; i < count; i++) {
      positions.forEach(p => {
        results.push({ num: rand(digits), pos: p, mode });
      });
    }

    const nums = results.map(r => r.num);
    animateDigits(nums);

    results.forEach(r => {
      history.unshift({ ...r, rev: reverse(r.num), time: new Date().toLocaleTimeString('th-TH') });
    });
    if (history.length > 50) history = history.slice(0, 50);
    localStorage.setItem('lotto_history', JSON.stringify(history));
    renderHistory();
  }

  function renderHistory() {
    const list = document.getElementById('historyList');
    if (history.length === 0) {
      list.innerHTML = '<p class="empty-msg">ยังไม่มีการสุ่ม กดปุ่มด้านบนเลย!</p>';
      return;
    }
    list.innerHTML = history.map(h => {
      const tagClass = h.mode === '2' ? 't2' : '';
      const revStr = h.rev !== h.num ? ` <span class="h-rev">/ ${h.rev}</span>` : '';
      return `<div class="history-item">
        <div>
          <span class="h-num">${h.num}</span>${revStr}
        </div>
        <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap;justify-content:flex-end;">
          <span class="h-tag ${tagClass}">${h.mode} ตัว ${h.pos}</span>
          <span style="font-size:0.72rem;color:#4a5568;">${h.time}</span>
        </div>
      </div>`;
    }).join('');
  }

  function clearHistory() {
    history = [];
    localStorage.removeItem('lotto_history');
    renderHistory();
  }

  // Init
  resetDisplay();
  renderHistory();
</script>
</body>
</html>
